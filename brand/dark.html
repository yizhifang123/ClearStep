<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;width:1200px;height:420px;background:#0a0a0a}
.row{display:flex;align-items:center;gap:34px}
.ico{height:200px}
.ico g{fill:none;stroke:#ffffff;stroke-linecap:round;stroke-linejoin:round}
.word{font-weight:800;letter-spacing:-.025em;color:#ffffff;font-size:128px;line-height:1}
.word .l{font-weight:500;opacity:.85}
</style></head><body>
<div class="row">
  <svg class="ico" viewBox="0 0 120 82"><g>
    <path d="M16 58 A 44 44 0 0 1 104 58" stroke-width="3.2"/>
    <path d="M8 58 H46 l4 -15 l6 28 l6 -22 l5 9 H112" stroke-width="4"/>
    <path d="M16 58 V70" stroke-width="3"/>
    <path d="M104 58 V70" stroke-width="3"/>
  </g></svg>
  <div class="word"><span class="l">Mind</span>Bridge</div>
</div>
</body></html>
